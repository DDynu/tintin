<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-gradient)"/>
  
  <!-- Decorative lines representing connections -->
  <line x1="100" y1="100" x2="300" y2="200" stroke="url(#glow-gradient)" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <line x1="300" y1="200" x2="500" y2="150" stroke="url(#glow-gradient)" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <line x1="500" y1="150" x2="700" y2="250" stroke="url(#glow-gradient)" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <line x1="700" y1="250" x2="900" y2="180" stroke="url(#glow-gradient)" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <line x1="900" y1="180" x2="1100" y2="220" stroke="url(#glow-gradient)" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  
  <!-- Message bubbles -->
  <g filter="url(#glow)">
    <ellipse cx="200" cy="120" rx="40" ry="25" fill="#3b82f6" opacity="0.8"/>
    <ellipse cx="400" cy="180" rx="35" ry="22" fill="#8b5cf6" opacity="0.8"/>
    <ellipse cx="600" cy="140" rx="45" ry="28" fill="#06b6d4" opacity="0.8"/>
    <ellipse cx="800" cy="200" rx="38" ry="24" fill="#3b82f6" opacity="0.8"/>
    <ellipse cx="1000" cy="160" rx="42" ry="26" fill="#8b5cf6" opacity="0.8"/>
  </g>
  
  <!-- Connection dots -->
  <circle cx="300" cy="200" r="6" fill="#3b82f6" opacity="0.9"/>
  <circle cx="500" cy="150" r="6" fill="#8b5cf6" opacity="0.9"/>
  <circle cx="700" cy="250" r="6" fill="#06b6d4" opacity="0.9"/>
  <circle cx="900" cy="180" r="6" fill="#3b82f6" opacity="0.9"/>
  
  <!-- Title text -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">
    TinTin
  </text>
  <text x="600" y="360" font-family="Arial, sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle">
    Real-time Chat Application
  </text>
</svg>
